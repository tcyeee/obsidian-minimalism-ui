name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      # 主题 CSS / 字体已由构建脚本内嵌进 main.js，分发产物就是标准三件套
      - name: Package plugin
        run: |
          mkdir -p obsidian-minimalism-ui
          cp main.js manifest.json styles.css obsidian-minimalism-ui/
          zip -r obsidian-minimalism-ui.zip obsidian-minimalism-ui

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            obsidian-minimalism-ui.zip \
            main.js manifest.json styles.css
