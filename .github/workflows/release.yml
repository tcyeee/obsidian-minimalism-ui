name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Package plugin
        run: |
          mkdir -p obsidian-minimalism-ui
          cp main.js manifest.json styles.css obsidian-minimalism-ui/
          cp -r fonts obsidian-minimalism-ui/
          zip -r obsidian-minimalism-ui.zip obsidian-minimalism-ui

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            obsidian-minimalism-ui.zip \
            main.js manifest.json styles.css
